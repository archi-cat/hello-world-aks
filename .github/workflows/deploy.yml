name: Application — Build & Deploy

on:
  push:
    branches:
      - main
    paths:
      - 'app/**'
      - 'k8s/**'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  build:
    name: Build and push Docker images
    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ steps.tag.outputs.IMAGE_TAG }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to ACR
        run: az acr login --name ${{ secrets.ACR_NAME }}

      - name: Set image tag
        id: tag
        run: echo "IMAGE_TAG=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

      - name: Build web Docker image
        run: |
          docker build \
            -f ./app/web/Dockerfile \
            -t ${{ secrets.ACR_NAME }}.azurecr.io/hello-world-web:${{ steps.tag.outputs.IMAGE_TAG }} \
            -t ${{ secrets.ACR_NAME }}.azurecr.io/hello-world-web:latest \
            ./app/web

      - name: Push web Docker image
        run: |
          docker push ${{ secrets.ACR_NAME }}.azurecr.io/hello-world-web:${{ steps.tag.outputs.IMAGE_TAG }}
          docker push ${{ secrets.ACR_NAME }}.azurecr.io/hello-world-web:latest

      - name: Build API Docker image
        run: |
          docker build \
            -f ./app/api/Dockerfile \
            -t ${{ secrets.ACR_NAME }}.azurecr.io/hello-world-api:${{ steps.tag.outputs.IMAGE_TAG }} \
            -t ${{ secrets.ACR_NAME }}.azurecr.io/hello-world-api:latest \
            ./app/api

      - name: Push API Docker image
        run: |
          docker push ${{ secrets.ACR_NAME }}.azurecr.io/hello-world-api:${{ steps.tag.outputs.IMAGE_TAG }}
          docker push ${{ secrets.ACR_NAME }}.azurecr.io/hello-world-api:latest

  deploy:
    name: Deploy to AKS
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get AKS credentials
        run: |
          az aks get-credentials \
            --name ${{ secrets.AKS_CLUSTER_NAME }} \
            --resource-group ${{ secrets.AKS_RESOURCE_GROUP }} \
            --overwrite-existing

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"
          terraform_wrapper: false

      # Retrieve Terraform outputs needed for manifest substitution
      - name: Get Terraform outputs
        id: tf
        working-directory: terraform
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ secrets.TF_STATE_RESOURCE_GROUP }}" \
            -backend-config="storage_account_name=${{ secrets.TF_STATE_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=${{ secrets.TF_STATE_CONTAINER }}" \
            -backend-config="key=hello-world-aks.tfstate" \
            -reconfigure

          echo "workload_identity_client_id=$(terraform output -raw workload_identity_client_id)" >> $GITHUB_OUTPUT
          echo "agc_frontend_id=$(terraform output -raw agc_frontend_id)"                         >> $GITHUB_OUTPUT
          echo "agc_name=$(terraform output -raw agc_name)"                                       >> $GITHUB_OUTPUT
          echo "web_app_insights=$(terraform output -raw web_app_insights_connection_string)"     >> $GITHUB_OUTPUT
          echo "api_app_insights=$(terraform output -raw api_app_insights_connection_string)"     >> $GITHUB_OUTPUT
        env:
          ARM_CLIENT_ID:       ${{ secrets.AZURE_CLIENT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_TENANT_ID:       ${{ secrets.AZURE_TENANT_ID }}
          ARM_USE_OIDC:        true

      # envsubst replaces all ${PLACEHOLDER} values in the manifests
      # with their real values before applying them to the cluster
      - name: Substitute manifest placeholders
        env:
          ACR_NAME:                          ${{ secrets.ACR_NAME }}
          IMAGE_TAG:                         ${{ needs.build.outputs.image_tag }}
          SQL_SERVER_NAME:                   ${{ secrets.SQL_SERVER_NAME }}
          SQL_DATABASE_NAME:                 ${{ secrets.SQL_DATABASE_NAME }}
          WORKLOAD_IDENTITY_CLIENT_ID:       ${{ steps.tf.outputs.workload_identity_client_id }}
          AGC_FRONTEND_ID:                   ${{ steps.tf.outputs.agc_frontend_id }}
          AGC_RESOURCE_ID:                   /subscriptions/${{ secrets.AZURE_SUBSCRIPTION_ID }}/resourceGroups/${{ secrets.AKS_RESOURCE_GROUP }}/providers/Microsoft.ServiceNetworking/trafficControllers/${{ steps.tf.outputs.agc_name }}
          WEB_APP_INSIGHTS_CONNECTION_STRING: ${{ steps.tf.outputs.web_app_insights }}
          API_APP_INSIGHTS_CONNECTION_STRING: ${{ steps.tf.outputs.api_app_insights }}
        run: |
          mkdir -p k8s-rendered
          for f in k8s/*.yaml; do
            envsubst < "$f" > "k8s-rendered/$(basename $f)"
          done
          echo "Rendered manifests:"
          ls k8s-rendered/

      # Apply in explicit order — namespace and service account first,
      # then workloads, then routing
      - name: Apply namespace and service account
        run: |
          kubectl apply -f k8s-rendered/namespace.yaml
          kubectl apply -f k8s-rendered/serviceaccount.yaml

      - name: Apply services
        run: |
          kubectl apply -f k8s-rendered/api-service.yaml
          kubectl apply -f k8s-rendered/web-service.yaml

      - name: Apply deployments
        run: |
          kubectl apply -f k8s-rendered/api-deployment.yaml
          kubectl apply -f k8s-rendered/web-deployment.yaml

      - name: Apply Gateway and HTTPRoute
        run: |
          kubectl apply -f k8s-rendered/gateway.yaml
          kubectl apply -f k8s-rendered/httproute.yaml

      - name: Wait for deployments to roll out
        run: |
          kubectl rollout status deployment/web -n hello-world --timeout=120s
          kubectl rollout status deployment/api -n hello-world --timeout=120s

      - name: Print pod status
        run: kubectl get pods -n hello-world

  configure-sql:
    name: Configure SQL Workload Identity access
    runs-on: ubuntu-latest
    needs: deploy

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Wait for Workload Identity to propagate
        run: sleep 30

      - name: Run SQL setup script
        shell: pwsh
        run: |
          ./scripts/Set-AksWorkloadIdentity.ps1 `
            -SqlServerFqdn "${{ secrets.SQL_SERVER_NAME }}.database.windows.net" `
            -SqlDatabaseName "${{ secrets.SQL_DATABASE_NAME }}" `
            -WorkloadIdentityName "uami-hello-world-api"