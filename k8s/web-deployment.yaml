apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: hello-world
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
        - name: web
          image: "${ACR_NAME}.azurecr.io/hello-world-web:${IMAGE_TAG}"
          ports:
            - containerPort: 8000
          env:
            - name: API_URL
              # The web pod reaches the API via the Kubernetes ClusterIP
              # service DNS name — no public URL needed
              value: "http://api.hello-world.svc.cluster.local"
            - name: APPLICATIONINSIGHTS_CONNECTION_STRING
              value: "${WEB_APP_INSIGHTS_CONNECTION_STRING}"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"