apiVersion: v1
kind: ServiceAccount
metadata:
  name: api-service-account
  namespace: hello-world
  annotations:
    # This annotation is what links the Kubernetes service account to the
    # Azure User Assigned Managed Identity. The value is injected by the
    # deploy pipeline from terraform output workload_identity_client_id
    azure.workload.identity/client-id: "${WORKLOAD_IDENTITY_CLIENT_ID}"
  labels:
    azure.workload.identity/use: "true"