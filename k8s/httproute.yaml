apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: hello-world-route
  namespace: hello-world
spec:
  parentRefs:
    - name: hello-world-gateway
      namespace: hello-world
  rules:
    # All traffic goes to the web service —
    # the web pod internally calls the API via cluster DNS
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: web
          port: 80